name: UNGM Daily Watch

on:
  push:
    branches:
      - main
      - codex
  schedule:
    # 13:30 Asia/Shanghai every day. GitHub Actions cron uses UTC.
    - cron: "30 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ungm-watch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show checked out revision
        run: |
          git rev-parse HEAD
          git log -1 --oneline
          grep -nE "wait_for_function|wait_for_selector|No procurement opportunity" ungm_watch.py | head -10

      - name: Restore sent IDs cache
        uses: actions/cache/restore@v4
        with:
          path: sent_ids.json
          key: ungm-sent-ids-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ungm-sent-ids-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run UNGM watcher
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TIMEZONE: Asia/Shanghai
        run: python ungm_watch.py

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ungm-debug-${{ github.run_id }}-${{ github.run_attempt }}
          path: debug/
          if-no-files-found: ignore
          retention-days: 7

      - name: Ensure sent IDs file exists
        if: success()
        run: |
          if [ ! -f sent_ids.json ]; then
            printf '{"sent_ids":[]}\n' > sent_ids.json
          fi

      - name: Save sent IDs cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: sent_ids.json
          key: ungm-sent-ids-${{ github.run_id }}-${{ github.run_attempt }}
